<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阅启【我的喜欢】 — 晚睐</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .fav-layout {
      max-width: var(--content-max);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 1.5rem;
      align-items: start;
    }

    @media (max-width: 720px) {
      .fav-layout {
        grid-template-columns: 1fr;
      }
    }

    /* 页面标题 */
    .fav-page-title {
      font-family: var(--font-heading);
      font-size: 1.8rem;
      color: var(--color-heading);
      text-align: center;
      padding: 2rem 1rem 0.5rem;
      letter-spacing: 0.08em;
    }

    .fav-page-subtitle {
      text-align: center;
      font-family: var(--font-ui);
      font-size: 0.85rem;
      color: var(--color-meta);
      margin-bottom: 1.5rem;
    }

    /* 编辑小卡片 */
    .fav-editor-card {
      background: var(--color-card);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: 1.5rem;
      position: sticky;
      top: 5rem;
    }

    .fav-editor-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #d4a0b0, #a0b8d0);
      border-radius: var(--radius-card) var(--radius-card) 0 0;
    }

    .fav-editor-card h3 {
      font-family: var(--font-heading);
      font-size: 1rem;
      color: var(--color-heading);
      margin-bottom: 1rem;
      padding-top: 0.3rem;
    }

    .fav-editor-card .form-group {
      margin-bottom: 0.75rem;
    }

    .fav-editor-card label {
      display: block;
      font-family: var(--font-ui);
      font-size: 0.78rem;
      color: var(--color-meta);
      margin-bottom: 0.25rem;
    }

    .fav-editor-card textarea,
    .fav-editor-card input {
      width: 100%;
      font-family: var(--font-body);
      font-size: 0.9rem;
      padding: 0.5rem 0.65rem;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      background: var(--color-bg);
      color: var(--color-body);
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }

    .fav-editor-card textarea:focus,
    .fav-editor-card input:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(91,141,176,0.1);
    }

    .fav-editor-card textarea {
      min-height: 80px;
      line-height: 1.8;
      resize: vertical;
    }

    .fav-editor-card .btn-row {
      display: flex;
      gap: 0.4rem;
      margin-top: 0.8rem;
    }

    .btn {
      font-family: var(--font-ui);
      font-size: 0.82rem;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--color-accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--color-accent-light); }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--color-border);
      color: var(--color-meta);
    }
    .btn-ghost:hover { border-color: var(--color-accent); color: var(--color-accent); }

    .btn-danger {
      background: transparent;
      border: 1px solid #e0c8c8;
      color: #b0606c;
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
    }
    .btn-danger:hover { background: #fdf4f4; }

    /* 收藏卡片 — 与主页 poem-card 一致 */
    .fav-poem-card {
      background: var(--color-card);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: var(--card-padding);
      position: relative;
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      margin-bottom: var(--card-gap);
    }

    .fav-poem-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #d4a0b0, #c0a0b8, #a0b8d0);
      border-radius: var(--radius-card) var(--radius-card) 0 0;
    }

    @media (prefers-reduced-motion: no-preference) {
      .fav-poem-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-card-hover);
      }
    }

    .fav-poem-card .card-text {
      font-family: var(--font-body);
      font-size: 1rem;
      font-size: clamp(1rem, 2vw, 1.15rem);
      line-height: 1.9;
      color: var(--color-body);
      white-space: pre-wrap;
      padding-top: 0.25rem;
    }

    .fav-poem-card .card-text::before { content: '「'; color: var(--color-accent-light); }
    .fav-poem-card .card-text::after  { content: '」'; color: var(--color-accent-light); }

    .fav-poem-card .card-meta-row {
      margin-top: 1.2rem;
      padding-top: 0.8rem;
      border-top: 1px solid var(--color-border);
      font-family: var(--font-ui);
      font-size: 0.82rem;
      color: var(--color-meta);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .fav-poem-card .card-actions {
      display: flex;
      gap: 0.35rem;
    }

    /* 空状态 */
    .fav-empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--color-meta);
      font-family: var(--font-ui);
      font-size: 0.95rem;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--color-heading);
      color: #fff;
      font-family: var(--font-ui);
      font-size: 0.9rem;
      padding: 0.65rem 1.5rem;
      border-radius: 20px;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    @media (max-width: 720px) {
      .fav-editor-card {
        position: static;
        order: -1;
      }

      .fav-poem-card {
        padding: 1.5rem;
        border-radius: 12px;
      }

      .fav-poem-card::before {
        border-radius: 12px 12px 0 0;
      }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="site-title">晚睐</a>
      <nav class="filter-nav" aria-label="导航">
        <a href="index.html" style="font-family:var(--font-ui);font-size:0.85rem;color:var(--color-meta);text-decoration:none;padding:0.4rem 0.8rem;">← 返回</a>
      </nav>
    </div>
  </header>

  <h1 class="fav-page-title">阅启【我的喜欢】</h1>
  <p class="fav-page-subtitle" id="fav-count">收藏你心动的句子</p>

  <main style="flex:1;padding:0 1rem 4rem;position:relative;z-index:2;">
    <div class="fav-layout">

      <!-- 左侧：收藏列表 -->
      <div class="fav-list-col" id="fav-list">
        <div class="fav-empty">📖<br>还没有收藏，在右侧写下你喜欢的句子吧</div>
      </div>

      <!-- 右侧：编辑小卡片 -->
      <div class="fav-editor-card">
        <h3 id="form-title">✎ 添加喜欢的句子</h3>
        <div class="form-group">
          <label for="fav-text">句子内容</label>
          <textarea id="fav-text" placeholder="在此写下或粘贴你喜欢的句子…"></textarea>
        </div>
        <div class="form-group">
          <label for="fav-source">出处</label>
          <input type="text" id="fav-source" placeholder="如：《某某书》· 作者名" maxlength="100">
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" id="btn-save">收藏</button>
          <button class="btn btn-ghost" id="btn-clear">清空</button>
        </div>
        <input type="hidden" id="edit-id" value="">
      </div>

    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
  (function () {
    'use strict';

    var STORAGE_KEY = 'user-favorites';

    var textInp = document.getElementById('fav-text');
    var sourceInp = document.getElementById('fav-source');
    var editId = document.getElementById('edit-id');
    var btnSave = document.getElementById('btn-save');
    var btnClear = document.getElementById('btn-clear');
    var formTitle = document.getElementById('form-title');
    var favList = document.getElementById('fav-list');
    var favCount = document.getElementById('fav-count');

    function loadStored() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
      catch (e) { return []; }
    }

    function saveStored(items) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function save() {
      var text = textInp.value.trim();
      if (!text) { toast('请输入句子内容'); textInp.focus(); return; }

      var items = loadStored();
      if (editId.value) {
        for (var i = 0; i < items.length; i++) {
          if (items[i].id === editId.value) {
            items[i].text = text;
            items[i].source = sourceInp.value.trim();
            break;
          }
        }
        toast('已更新');
      } else {
        items.push({
          id: 'fav-' + Date.now(),
          text: text,
          source: sourceInp.value.trim(),
          date: new Date().toISOString().split('T')[0]
        });
        toast('已收藏');
      }

      saveStored(items);
      clearForm();
      render();
    }

    function clearForm() {
      textInp.value = '';
      sourceInp.value = '';
      editId.value = '';
      formTitle.textContent = '✎ 添加喜欢的句子';
      btnSave.textContent = '收藏';
    }

    function editItem(id) {
      var items = loadStored();
      var item = items.find(function (it) { return it.id === id; });
      if (!item) return;
      textInp.value = item.text;
      sourceInp.value = item.source || '';
      editId.value = item.id;
      formTitle.textContent = '✎ 编辑句子';
      btnSave.textContent = '保存修改';
      document.querySelector('.fav-editor-card').scrollIntoView({ behavior: 'smooth' });
    }

    function deleteItem(id) {
      if (!confirm('确定删除这条收藏？')) return;
      var items = loadStored().filter(function (it) { return it.id !== id; });
      saveStored(items);
      if (editId.value === id) clearForm();
      render();
      toast('已删除');
    }

    function esc(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function render() {
      var items = loadStored();
      favCount.textContent = '共 ' + items.length + ' 条收藏';

      if (items.length === 0) {
        favList.innerHTML = '<div class="fav-empty">📖<br>还没有收藏，在右侧写下你喜欢的句子吧</div>';
        return;
      }

      var html = '';
      items.slice().reverse().forEach(function (item) {
        html += '<article class="fav-poem-card">';
        html += '<div class="card-text">' + esc(item.text) + '</div>';
        html += '<div class="card-meta-row">';
        html += '<span>';
        if (item.source) html += esc(item.source) + ' · ';
        html += esc(item.date);
        html += '</span>';
        html += '<span class="card-actions">';
        html += '<button class="btn btn-ghost" data-edit="' + item.id + '" style="font-size:0.75rem;padding:0.2rem 0.6rem;">编辑</button>';
        html += '<button class="btn btn-danger" data-delete="' + item.id + '">删除</button>';
        html += '</span>';
        html += '</div>';
        html += '</article>';
      });
      favList.innerHTML = html;

      favList.querySelectorAll('[data-edit]').forEach(function (btn) {
        btn.addEventListener('click', function () { editItem(this.dataset.edit); });
      });
      favList.querySelectorAll('[data-delete]').forEach(function (btn) {
        btn.addEventListener('click', function () { deleteItem(this.dataset.delete); });
      });
    }

    var toastEl = document.getElementById('toast');
    var toastTimer;
    function toast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function () { toastEl.classList.remove('show'); }, 2000);
    }

    btnSave.addEventListener('click', save);
    btnClear.addEventListener('click', clearForm);

    render();
  })();
  </script>
</body>
</html>
